<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/jpg" href="img/favicon.jpg"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.Frias PRO</title>
	<link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="css/styles.css">	
	  <!-- Vincular Font Awesome -->
    <link href="css/fontawesome.min.css" rel="stylesheet" />
    <link href="css/solid.min.css" rel="stylesheet" />

</head>
<body>
	<header>
		<div class="left">
					<!-- anterior onclick con location.href='https://es.linkedin.com/in/sfrias'-->
      <button class="name-btn" onclick="window.open('https://es.linkedin.com/in/sfrias','_blank')">
        <i class="fas fa-network-wired"></i> Santiago Frias
      </button>
    </div>

    <figure>
		<figurecaption><small>Music by Melvin Waller</small></figurecaption>
		<audio src="music0.mp3" loading="lazy" autoplay loop controls></audio>
    </figure>

    <div class="right">
      <button class="contact-btn" id="contact-btn"
        <i class="fa-solid fa-envelope"></i>
        <span>Contact</span>
      </button>
      <script src="scripts/ViewEmail.js"></script>
    </div>
  </header>
    <!-- Sección de botones -->
  <div class="main-buttons">
    <button class="main-btn home">
      <i class="fas fa-home"></i> Home
    </button>
    <button class="main-btn experience">
      <i class="fas fa-cogs"></i> Experience
    </button>
    <button class="main-btn projects">
      <i class="fas fa-rocket"></i> Projects
    </button>
    <button class="main-btn skills">
      <i class="fas fa-bolt"></i> Skills
    </button>
  </div>
 	<canvas id="Matrix"></canvas>
  <script src="./index.js"></script>
</body>
</html>
